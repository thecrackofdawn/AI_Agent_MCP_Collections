# SearXNG configuration file
use_default_settings: true

# General settings
general:
  instance_name: "SearXNG + MCP"
  debug: false
  enable_metrics: false

# Server settings
server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "edcad06945e4696ae95c9e4a2bb4ac92242b4be00a41286ad73753c3d34b3df4"
  method: "GET"
  http_protocol_version: "1.1"

# Search settings
search:
  safe_search: 0
  autocomplete: ""
  min_length_of_query: 3
  formats:
    - html
    - json
    - csv
  max_results: 20

# Result formats for API
result_formats:
  html: true
  json: true
  csv: true
  rss: true

# Outgoing proxy configuration
outgoing:
  proxies:
    http:
      - http://host.docker.internal:7897
    https:
      - http://host.docker.internal:7897
  request_timeout: 30.0
  max_request_timeout: 30.0
  number_of_retries: 2

# UI settings
ui:
  theme_args:
    simple_style: auto
  infinite_scroll: true
  results_on_new_tab: false

# Enabled search engines
engines:
  - name: duckduckgo
  - name: wikipedia
    engine: wikipedia
  - name: wikidata
    engine: wikidata

# Disable limiter
limiter: false
