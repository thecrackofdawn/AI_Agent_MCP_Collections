version: '3.8'

services:
  searxng-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_PROXY_HTTP=${HTTP_PROXY:-${http_proxy}}
        - BUILD_PROXY_HTTPS=${HTTPS_PROXY:-${https_proxy}}
    image: searxng-mcp:latest
    container_name: searxng-mcp

    # Use host network - allows container to directly access host proxy
    network_mode: host

    # Environment variables
    environment:
      - SEARXNG_URL=http://127.0.0.1:3001
      - MCP_HTTP_PORT=3000  # Enable HTTP transport for MCP server
      - MCP_BIND_ADDRESS=${BIND_ADDRESS:-127.0.0.1}

      # Proxy configuration - pass host proxy to container directly (host network mode)
      # No address conversion needed, container shares host network stack
      - HOST_HTTP_PROXY=${HTTP_PROXY}
      - HOST_HTTPS_PROXY=${HTTPS_PROXY}
      - HOST_ALL_PROXY=${ALL_PROXY}

      # Optional: Add authentication for MCP server
      # - AUTH_USERNAME=your_username
      # - AUTH_PASSWORD=your_password

      # Optional: SearXNG configuration
      # - INSTANCE_NAME=SearXNG+MCP
      # - AUTOCOMPLETE=1

    # Restart policy
    restart: unless-stopped

    # Volume mounts - persist SearXNG configuration
    volumes:
      - ./searxng-config:/etc/searxng

    # Health check - test both SearXNG and MCP JSON endpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/search?q=test&format=json > /dev/null 2>&1 || curl -f http://localhost:3000/health > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
